    <audio id="audio-player"></audio>

        <script>
            const buttons = document.querySelectorAll('.letters .alpha');
            const audioPlayer = document.getElementById('audio-player');

            buttons.forEach(button => {
                button.addEventListener('click', (e) => {
                    e.preventDefault(); // بيمنع اللينك الفاضي إنه يعمل ريفريش للشاشة
                    
                    const letter = button.innerText.trim(); // بيقرا الحرف اللي جوه الزرار
                    
                    audioPlayer.src = `audios/${letter}.mp3`; // بيروح لفولدر audios ويجيب الصوت
                    audioPlayer.currentTime = 0; 
                    audioPlayer.play(); // بيشغل الصوت
                });
            });
        </script>
